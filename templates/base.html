<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% if page and page.title %}{{ page.title }} | {{ config.title }}{% elif section and section.title %}{{ section.title }} | {{ config.title }}{% else %}{{ config.title }}{% endif %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{% if page and page.description %}{{ page.description }}{% elif section and section.description %}{{ section.description }}{% else %}{{ config.description }}{% endif %}">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <div class="container header-inner">
        <a class="site-title site-brand" href="/">
          <svg class="site-mark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" aria-hidden="true" focusable="false">
            <rect x="18" y="18" width="64" height="64" fill="none" stroke="currentColor" stroke-width="8"/>
          </svg>
          <span>{{ config.title }}</span>
        </a>
        <nav class="site-nav" aria-label="Primary">
          <a href="/" {% if current_path == "/" %}aria-current="page"{% endif %}>Home</a>
          <a href="/projects/" {% if current_path is starting_with("/projects") %}aria-current="page"{% endif %}>Projects</a>
          <a href="/services/" {% if current_path is starting_with("/services") %}aria-current="page"{% endif %}>Services</a>
        </nav>
      </div>
    </header>

    <main class="site-main">
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p>Zero Labs</p>
        <p class="footer-meta"><a href="https://github.com/zerolabsco">GitHub</a> / Software systems, public tooling, live experiments.</p>
      </div>
    </footer>
  </div>
</body>
</html>
